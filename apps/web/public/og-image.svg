<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Accent glow top-right -->
    <radialGradient id="glowTR" cx="88%" cy="18%" r="50%">
      <stop offset="0%" stop-color="#4DB8FF" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#4DB8FF" stop-opacity="0"/>
    </radialGradient>
    <!-- Accent glow bottom-left -->
    <radialGradient id="glowBL" cx="12%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#7DD3FC" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#7DD3FC" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0L0 0 0 56" fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="#0A0B0D"/>
  <!-- Grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Glows -->
  <rect width="1200" height="630" fill="url(#glowTR)"/>
  <rect width="1200" height="630" fill="url(#glowBL)"/>
  <!-- Outer border -->
  <rect x="0.5" y="0.5" width="1199" height="629" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <!-- Top-left accent bar -->
  <rect x="0" y="0" width="220" height="2.5" fill="#4DB8FF" opacity="0.9"/>

  <!-- ── Logo mark (top-left) ─────────────────────────── -->
  <g transform="translate(72, 58) scale(3.0)">
    <path d="M4 6 L12 2 L20 6 L20 14 L12 18 L4 14 Z"
          stroke="#4DB8FF" stroke-width="1.5" stroke-linejoin="round"
          fill="rgba(77,184,255,0.09)"/>
    <line x1="12" y1="2"  x2="12" y2="18" stroke="#4DB8FF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4"  y1="6"  x2="20" y2="14" stroke="#4DB8FF" stroke-width="0.6" opacity="0.45"/>
    <line x1="20" y1="6"  x2="4"  y2="14" stroke="#4DB8FF" stroke-width="0.6" opacity="0.45"/>
  </g>

  <!-- Wordmark beside logo -->
  <text x="148" y="99"
        font-family="ui-monospace, 'SF Mono', Menlo, monospace"
        font-size="19" font-weight="500" letter-spacing="0.4"
        fill="#F5F6F7">so4<tspan fill="#5A6068">.market</tspan></text>

  <!-- ── Eyebrow ──────────────────────────────────────── -->
  <circle cx="76" cy="172" r="4" fill="#4DB8FF"/>
  <text x="92" y="178"
        font-family="ui-monospace, 'SF Mono', Menlo, monospace"
        font-size="12.5" font-weight="400" letter-spacing="2.2"
        fill="#5A6068">MAINNET · ON-CHAIN PERPETUALS</text>

  <!-- ── Main headline ────────────────────────────────── -->
  <text x="72" y="272"
        font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-size="78" font-weight="500" letter-spacing="-3"
        fill="#F5F6F7">perpetual markets,</text>

  <text x="72" y="364"
        font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-size="78" font-weight="500" letter-spacing="-3"
        fill="#F5F6F7">
    <tspan font-style="italic" font-weight="400" fill="#4DB8FF">settled</tspan>
    <tspan> on-chain.</tspan>
  </text>

  <!-- ── Subline ──────────────────────────────────────── -->
  <text x="72" y="420"
        font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-size="19.5" font-weight="400"
        fill="#8A8F98">A unified-liquidity perp DEX · deep books · sub-second matching · self-custodied risk.</text>

  <!-- ── Stats divider ────────────────────────────────── -->
  <line x1="72" y1="468" x2="1128" y2="468" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Stat 1: 24h Volume -->
  <text x="72"  y="502" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" font-weight="400" letter-spacing="1.8" fill="#5A6068">24H VOLUME</text>
  <text x="72"  y="542" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="30" font-weight="400" letter-spacing="-0.5" fill="#F5F6F7">$8.42B</text>

  <line x1="224" y1="480" x2="224" y2="556" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Stat 2: Markets -->
  <text x="248" y="502" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" font-weight="400" letter-spacing="1.8" fill="#5A6068">MARKETS</text>
  <text x="248" y="542" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="30" font-weight="400" letter-spacing="-0.5" fill="#F5F6F7">184</text>

  <line x1="380" y1="480" x2="380" y2="556" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Stat 3: Open Interest -->
  <text x="404" y="502" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" font-weight="400" letter-spacing="1.8" fill="#5A6068">OPEN INTEREST</text>
  <text x="404" y="542" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="30" font-weight="400" letter-spacing="-0.5" fill="#F5F6F7">$2.41B</text>

  <line x1="570" y1="480" x2="570" y2="556" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Stat 4: Taker fee -->
  <text x="594" y="502" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" font-weight="400" letter-spacing="1.8" fill="#5A6068">TAKER FEE</text>
  <text x="594" y="542" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="30" font-weight="400" letter-spacing="-0.5" fill="#F5F6F7">0.014%</text>

  <line x1="730" y1="480" x2="730" y2="556" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Stat 5: Max leverage -->
  <text x="754" y="502" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" font-weight="400" letter-spacing="1.8" fill="#5A6068">MAX LEVERAGE</text>
  <text x="754" y="542" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="30" font-weight="400" letter-spacing="-0.5" fill="#F5F6F7">50×</text>

  <!-- ── Bottom-right version tag ─────────────────────── -->
  <text x="1128" y="598"
        font-family="ui-monospace, 'SF Mono', Menlo, monospace"
        font-size="12" font-weight="400" letter-spacing="1.5"
        fill="rgba(90,96,104,0.55)" text-anchor="end">SO4 · MAINNET v1.4</text>
</svg>
